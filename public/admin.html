<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChat | Admin Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Extra Admin Styles */
        .admin-layout { height: 100vh; width: 100vw; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .view-active { display: flex; animation: slideUpFade 0.4s ease forwards; }
        .view-hidden { display: none !important; }
        
        /* Grid for Products */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; width: 100%; max-width: 1200px; margin-top: 30px;
        }
        .inventory-card {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 20px; color: white; display: flex; flex-direction: column; gap: 10px;
        }
        .inventory-card h3 { color: var(--primary-color); }
        .stock-badge { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; width: fit-content; }
        .out-of-stock { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .login-box { flex-direction: column; gap: 15px; width: 350px; text-align: center; margin: auto; }
        .login-box input { width: 100%; }
        .nav-header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .btn-logout:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <div id="login-view" class="glass-panel login-box view-active">
        <h2>Admin Secure Login</h2>
        <input type="text" id="admin-user" placeholder="Username" autocomplete="off">
        <input type="password" id="admin-pass" placeholder="Password">
        <button id="login-btn">Authenticate</button>
    </div>

    <div id="dashboard-view" class="admin-layout view-hidden">
        <div class="nav-header">
            <h2>📦 Live Inventory Management</h2>
            <button id="logout-btn" class="btn-logout">Log Out</button>
        </div>
        
        <div id="inventory-grid" class="grid-container">
            </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
