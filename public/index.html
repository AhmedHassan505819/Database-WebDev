<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChat | Customer Care</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="chat-container glass-panel">
        <header class="chat-header">
            <div class="avatar">🤖</div>
            <div>
                <h2>SmartChat Assistant</h2>
                <p class="status">Online & Ready to Help</p>
            </div>
        </header>

        <div class="chat-box" id="chat-box">
            <div class="message bot-message slide-up">
                Hi! I am the SmartChat assistant. How can I help you shop today?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask about our inventory..." autocomplete="off">
            <button id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
