<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChat </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <section id="auth-view" class="view active">
        <div class="glass-panel auth-box">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Sign in to track your orders.</p>
            
            <input type="email" id="auth-email" placeholder="Gmail Address" class="hidden">
            
            <input type="text" id="auth-username" placeholder="Username" autocomplete="off">
            <input type="password" id="auth-password" placeholder="Password">
            
            <button id="auth-action-btn" onclick="handleAuth()">Sign In</button>
            <p class="toggle-text">New here? <span onclick="toggleAuthMode()">Register</span></p>
        </div>
    </section>

 <section id="chat-view" class="view">
        <nav class="top-nav">
            <button onclick="switchView('admin-view')" class="nav-btn admin-link hidden" id="go-admin-btn">Admin Portal</button>
            <button onclick="logout()" class="nav-btn">Logout</button>
        </nav>
        
        <div id="welcome-banner" class="welcome-banner"></div>

        <main class="chat-container glass-panel">
            <header class="chat-header">
                <div class="avatar">🤖</div>
                <div>
                    <h2>SmartChat Assistant</h2>
                    <p class="status">Ready to take your order</p>
                </div>
            </header>
            <div class="chat-box" id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask about items or your orders..." autocomplete="off">
                <button id="send-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
</button>
            </div>
        </main>
    </section>

    <section id="admin-view" class="view">
        <div class="admin-layout">
           <header class="nav-header">
    <h2>👑 Admin Command Center</h2>
    <button onclick="switchView('chat-view')" class="btn-return">⬅ Back to Chat</button>
</header>

            <div class="glass-panel add-product-panel">
                <h3>Add New Inventory</h3>
                <div class="add-flex">
                    <input type="text" id="new-item-name" placeholder="Product Name">
                    <input type="number" id="new-item-price" placeholder="Price ($)">
                    <input type="number" id="new-item-qty" placeholder="Quantity">
                    <button onclick="addNewProduct()" class="action-btn">Add Item</button>
                </div>
            </div>

            <div id="inventory-grid" class="grid-container">
                </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
